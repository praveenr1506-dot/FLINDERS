<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PrepAI Interview Coach</title>

<style>
body {
  font-family: Arial;
  background: #0b0f19;
  color: white;
  padding: 20px;
}

.container {
  max-width: 800px;
  margin: auto;
}

button {
  padding: 10px;
  margin: 5px;
  background: cyan;
  border: none;
  cursor: pointer;
}

.section {
  margin-bottom: 20px;
}

.card {
  border: 1px solid #333;
  padding: 10px;
  margin: 10px 0;
}

textarea {
  width: 100%;
  height: 120px;
  margin-top: 10px;
}

#result {
  white-space: pre-wrap;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

<h2>🚀 PrepAI Interview Coach</h2>

<!-- Resume Upload -->
<div class="section">
  <h3>Upload Resume</h3>
  <input type="file" id="resumeFile" accept=".pdf">
  <br>
  <button onclick="uploadResume()">Upload Resume</button>
  <button onclick="getResumeQuestions()">Generate Questions</button>
</div>

<!-- Question -->
<div class="section">
  <h3>Question</h3>
  <div id="question">No question yet</div>
  <button onclick="nextQuestion()">Next Question</button>
</div>

<!-- Answer -->
<div class="section">
  <h3>Your Answer</h3>
  <textarea id="answer"></textarea>
  <br>
  <button onclick="submitAnswer()">Analyze</button>
</div>

<!-- Result -->
<div class="section">
  <h3>Feedback</h3>
  <div id="result"></div>
</div>

</div>

<script>

/* 🔥 CHANGE THIS */
const BASE_URL = "https://your-backend-name.onrender.com";

/* GLOBAL STATE */
let resumeQuestions = [];
let currentIndex = 0;

/* UPLOAD RESUME */
async function uploadResume() {
  const file = document.getElementById("resumeFile").files[0];

  if (!file) {
    alert("Select a PDF first");
    return;
  }

  const formData = new FormData();
  formData.append("resume", file);

  try {
    const res = await fetch(`${BASE_URL}/upload_resume`, {
      method: "POST",
      body: formData
    });

    const data = await res.json();
    console.log(data);

    if (data.message) {
      alert("✅ Resume uploaded");
      resumeQuestions = [];
      currentIndex = 0;
    } else {
      alert(data.error);
    }

  } catch (err) {
    alert("Upload failed");
    console.error(err);
  }
}

/* GENERATE QUESTIONS */
async function getResumeQuestions() {

  if (!document.getElementById("resumeFile").files[0] && resumeQuestions.length === 0) {
    alert("Upload resume first");
    return;
  }

  try {
    document.getElementById("question").innerText = "Generating...";

    const res = await fetch(`${BASE_URL}/generate_questions`);
    const data = await res.json();

    console.log(data);

    if (data.questions) {
      resumeQuestions = data.questions;
      currentIndex = 0;
      showQuestion();
    } else {
      alert(data.error);
    }

  } catch (err) {
    alert("Failed to fetch questions");
  }
}

/* SHOW QUESTION */
function showQuestion() {
  if (currentIndex >= resumeQuestions.length) {
    document.getElementById("question").innerText = "No more questions";
    return;
  }

  document.getElementById("question").innerText =
    resumeQuestions[currentIndex];
}

/* NEXT QUESTION */
function nextQuestion() {
  currentIndex++;
  showQuestion();
}

/* ANALYZE ANSWER */
async function submitAnswer() {

  const question = document.getElementById("question").innerText;
  const answer = document.getElementById("answer").value;

  if (!question || question === "No question yet") {
    alert("Generate question first");
    return;
  }

  if (!answer) {
    alert("Write an answer");
    return;
  }

  try {
    document.getElementById("result").innerText = "Analyzing...";

    const res = await fetch(`${BASE_URL}/analyze`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ question, answer })
    });

    const data = await res.json();

    document.getElementById("result").innerHTML = formatResponse(data.result);

  } catch (err) {
    alert("Analysis failed");
  }
}

/* FORMAT RESPONSE */
function formatResponse(text) {
  return text
    .replace(/\n/g, "<br>")
    .replace(/\*\*(.*?)\*\*/g, "<b>$1</b>");
}

</script>

</body>
</html>
